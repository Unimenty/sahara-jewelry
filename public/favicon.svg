<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pill_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#143475;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Pill/Oval Shape matching logo-clean.png -->
  <rect x="32" y="128" width="448" height="256" rx="128" fill="url(#pill_grad)" />
  
  <!-- Stylized Elegant 'F' from the new brand identity -->
  <text x="256" y="315" font-family="'Inter', 'Georgia', 'Times New Roman', serif" font-size="200" font-weight="900" fill="white" text-anchor="middle" style="letter-spacing: -2px;">F</text>
  
  <!-- Subtle accent dot or leaf to keep a hint of the nature element -->
  <circle cx="360" cy="180" r="25" fill="#22c55e" />
</svg>
